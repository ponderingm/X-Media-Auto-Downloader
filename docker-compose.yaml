services:
  downloader:
    build: .
    container_name: x_downloader
    restart: unless-stopped
    volumes:
      - '${DOWNLOAD_ROOT}:/downloads'
      - '${CONFIG_ROOT}:/config' # ← フォールバックを削除し、環境変数のみに！
    environment:
      - TZ=Asia/Tokyo
      - DEBUG_DOWNLOAD_ROOT=${DOWNLOAD_ROOT}
      - DEBUG_MANAGER_PORT=${MANAGER_PORT:-9980}

  manager:
    build: ./manager
    container_name: x_manager
    restart: unless-stopped
    volumes:
      - '${DOWNLOAD_ROOT}:/downloads' # ← manager側も環境変数のみに統一！
      - '${CONFIG_ROOT}:/config' # ← こちらも環境変数のみに！
    ports: # ← exposeからportsに変更（ブラウザからアクセスするため）
      - '${MANAGER_PORT:-9980}:80'
    environment:
      - TZ=Asia/Tokyo

# 注意：一番下にあった「volumes: x_downloads: null」は完全に削除しました。
