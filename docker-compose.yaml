services:
  downloader:
    build: .
    restart: unless-stopped
    volumes:
      # type: bind を指定することで、Coolifyに「勝手にボリュームを作るな」と命令できます
      - type: bind
        source: ${DOWNLOAD_ROOT}
        target: /downloads
      - type: bind
        source: ${CONFIG_ROOT}
        target: /config
    environment:
      - TZ=Asia/Tokyo
      - DEBUG_DOWNLOAD_ROOT=${DOWNLOAD_ROOT}
      - DEBUG_MANAGER_PORT=${MANAGER_PORT:-9980}

  manager:
    build: ./manager
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${DOWNLOAD_ROOT}
        target: /downloads
      - type: bind
        source: ${CONFIG_ROOT}
        target: /config
    ports:
      - '${MANAGER_PORT:-9980}:8000'
    environment:
      - TZ=Asia/Tokyo
