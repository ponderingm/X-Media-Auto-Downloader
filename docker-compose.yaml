services:
  downloader:
    build: .
    container_name: x_downloader
    restart: unless-stopped
    volumes:
      - '${DOWNLOAD_ROOT}:/downloads'
      - '${CONFIG_ROOT}:/config'
    environment:
      - TZ=Asia/Tokyo
      - DEBUG_DOWNLOAD_ROOT=${DOWNLOAD_ROOT}
      - DEBUG_MANAGER_PORT=${MANAGER_PORT:-9980}

  manager:
    build: ./manager
    container_name: x_manager
    restart: unless-stopped
    volumes:
      - '${DOWNLOAD_ROOT}:/downloads'
      - '${CONFIG_ROOT}:/config'
    ports:
      - '${MANAGER_PORT:-9980}:8000' # ← ここが重要！exposeではなくportsを使います
    environment:
      - TZ=Asia/Tokyo
